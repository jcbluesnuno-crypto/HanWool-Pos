<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, getDocs, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBNGpBZsjaQjgXfMSgN-3prDZwH9GpXFm8",
    authDomain: "hanwool-pos.firebaseapp.com",
    projectId: "hanwool-pos",
    storageBucket: "hanwool-pos.firebasestorage.app",
    messagingSenderId: "650069843487",
    appId: "1:650069843487:web:148be5c10668389dd83f2a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  window._db = db;
  window._fsLib = { collection, doc, getDocs, setDoc, deleteDoc, onSnapshot };

  // ── Firestore 헬퍼 ──
  window.fsLoad = async (colName) => {
    const snap = await getDocs(collection(db, colName));
    return snap.docs.map(d => ({...d.data(), _fbId: d.id}));
  };

  window.fsSave = async (colName, item) => {
    const id = String(item.id || Date.now());
    await setDoc(doc(db, colName, id), {...item, _fbId: id});
  };

  window.fsDel = async (colName, id) => {
    await deleteDoc(doc(db, colName, String(id)));
  };

  // ── 실시간 동기화 ──
  window.fsListen = (colName, callback) => {
    return onSnapshot(collection(db, colName), snap => {
      const data = snap.docs.map(d => ({...d.data(), _fbId: d.id}));
      callback(data);
    });
  };

  // ── 초기 데이터 로드 ──
  window.addEventListener('load', async () => {
    showLoadingOverlay(true);
    try {
      // 각 컬렉션 실시간 리스닝
      fsListen('schedData', data => {
        if(data.length > 0){
          schedData = data.map(d => ({...d, id: +d.id||d.id}));
          if(window._appReady && mode==='sched') renderSched();
        }
      });
      fsListen('products', data => {
        if(data.length > 0){
          products = data.map(d => ({...d, id: +d.id||d.id}));
          if(window._appReady && mode==='stock') renderStock();
        }
      });
      fsListen('inbound', data => {
        inbound = data.map(d => ({...d, id: +d.id||d.id}));
      });
      fsListen('outbound', data => {
        outbound = data.map(d => ({...d, id: +d.id||d.id}));
      });
      fsListen('contracts', data => {
        contracts = data.map(d => ({...d, id: +d.id||d.id}));
        if(window._appReady && mode==='contract') renderContract();
      });
      fsListen('billings', data => {
        billings = data.map(d => ({...d, id: +d.id||d.id}));
        if(window._appReady && mode==='billing') renderBilling();
      });
      fsListen('asData', data => {
        asData = data.map(d => ({...d, id: +d.id||d.id}));
        if(window._appReady && mode==='as') renderAS();
      });

      // 초기 데이터가 없으면 샘플 데이터 업로드
      const snap = await getDocs(collection(db, 'schedData'));
      if(snap.empty){
        showToast('⬆️ 초기 데이터 업로드 중...', true);
        await uploadInitialData();
        showToast('✅ 데이터 업로드 완료!', true);
      }
    } catch(e) {
      console.error('Firebase 오류:', e);
      showToast('⚠️ 오프라인 모드로 실행중', false);
    }
    showLoadingOverlay(false);
    window._appReady = true;
    render();
  });

  // 초기 데이터 Firebase에 업로드
  window.uploadInitialData = async () => {
    const uploads = [
      ...schedData.map(d => fsSave('schedData', d)),
      ...products.map(d => fsSave('products', d)),
    ];
    await Promise.all(uploads);
  };
</script>

// 장비 텍스트 → 품목 배열 파싱
// "포스1세트+주방프린터3+테이블11+수신기1" → [{name,qty}, ...]
// ════════════════════════════════
function parseEquipment(equipStr){
  if(!equipStr) return [];
  // + 또는 쉼표로 분리
  return equipStr.split(/[+,]/).map(s=>s.trim()).filter(Boolean).map(seg=>{
    // 숫자 추출: 끝에 붙은 숫자 or "N개" "Nset" "N대" 형태
    const m = seg.match(/^(.+?)(\d+)(개|대|set|셋|세트)?$/i);
    if(m){
      const rawName = m[1].trim();
      const qty = parseInt(m[2]);
      return {rawName, qty: isNaN(qty)?1:qty};
    }
    // 숫자 없으면 qty=1
    return {rawName: seg.replace(/(개|대|set|셋|세트)$/i,'').trim(), qty:1};
  });
}

// 장비명으로 products 매칭 (유사도 기반)
function matchProduct(rawName){
  if(!rawName) return null;
  const n = rawName.toLowerCase().replace(/\s/g,'');
  // 정확히 포함하는 것 우선
  const aliases = {
    '포스본체':'포스 본체', '엣지포스':'포스 본체', '포스1세트':'포스 본체',
    '토스프론트':'토스프론트',
    '주방프린터':'주방프린터(3인치)', '프린터':'주방프린터(3인치)',
    '테이블오더':'테이블오더(주문/배터리)', '테이블':'테이블오더(주문/배터리)',
    '전기렬':'테이블오더(주문/전기)', '전기':'테이블오더(주문/전기)',
    '키오스크':'키오스크(스탠드형)',
    '핸드스캐너':'핸드스캐너', '스캐너':'핸드스캐너',
    '카카오qr':'카카오QR', '카카오':'카카오QR',
    '네이버커넥트':'네이버커넥트', '네이버':'네이버커넥트',
    '공유기':'공유기',
    '수신기':'수신기',
    '멀티충전기':'멀티충전기', '충전기':'멀티충전기',
    'cid':'CID',
  };
  // alias 먼저
  for(const [k,v] of Object.entries(aliases)){
    if(n.includes(k.toLowerCase())){
      const found = products.find(p=>p.name.toLowerCase().includes(v.toLowerCase()));
      if(found) return found;
    }
  }
  // products 이름으로 직접 검색
  return products.find(p=>p.name.toLowerCase().replace(/\s/g,'').includes(n)) ||
         products.find(p=>n.includes(p.name.toLowerCase().replace(/\s/g,'').slice(0,4))) ||
         null;
}

// note에서 금액 자동 파싱
// 판매/AS/출장비: 단순 금액, 렌탈: 총금액, CMS: 월사용료
function parseAmount(note, type){
  if(!note) return 0;
  // "16,500원" "33,000원" "77,000원" 패턴
  const matches = note.match(/[\d,]+(?:,\d{3})*원/g);
  if(!matches) return 0;
  const amounts = matches.map(m=>parseInt(m.replace(/[,원]/g,''))).filter(n=>n>0);
  if(!amounts.length) return 0;
  if(type==='CMS'){
    // CMS는 월사용료 → 가장 작은 값 (CMS 월 요금)
    return Math.min(...amounts);
  } else if(type==='렌탈'){
    // 렌탈 총금액 → 가장 큰 값
    return Math.max(...amounts);
  } else {
    // 판매/AS/출장비 → 첫번째 금액
    return amounts[0];
  }
}

);}

function updateOutSummary(n){
  let totalCost=0,totalRev=0,cnt=0;
  for(let i=0;i<n;i++){
    const ch=document.getElementById(`och-${i}`);
    if(!ch||!ch.checked) continue;
    const pid=+document.getElementById(`op-${i}`)?.value;
    const qty=+document.getElementById(`oq-${i}`)?.value||0;
    const sale=+document.getElementById(`os-${i}`)?.value||0;
    const p=getP(pid);
    if(p&&qty){
      totalCost+=(p.costPrice||0)*qty;
      totalRev+=sale*qty;
      cnt++;
    }
  }
  const profit=totalRev-totalCost;
  const el=document.getElementById('out-summary');
  if(el) el.innerHTML=`출고품목 <b>${cnt}종</b> | 총 매출 <b style="color:#3182ce">${krw(totalRev)}</b> | 총 원가 <b style="color:#d69e2e">${krw(totalCost)}</b> | 예상이익 <b style="color:${profit>=0?'#38a169':'#e53e3e'}">${krw(profit)}</b>`;
}

function saveBulkOutbound(schedId, schedName, n){
  const date = document.getElementById('o-date')?.value || today();
  let count=0, errors=[];
  for(let i=0;i<n;i++){
    const ch=document.getElementById(`och-${i}`);
    if(!ch||!ch.checked) continue;
    const pid=+document.getElementById(`op-${i}`)?.value;
    const qty=+document.getElementById(`oq-${i}`)?.value||1;
    const sale=+document.getElementById(`os-${i}`)?.value||0;
    if(!pid){continue;} // 미연결 건 skip
    const p=getP(pid);
    if(!p){errors.push(`상품 없음`);continue;}
    if(p.stock<qty){errors.push(`${p.name}: 재고부족(${p.stock})`);continue;}
    outbound.push({id:_oid++,productId:pid,qty,salePrice:sale,date,note:schedName,schedId:String(schedId),schedName});
    products=products.map(x=>x.id===pid?{...x,stock:x.stock-qty}:x);
    count++;
  }
  // 설치일정 자동 완료
  const s=schedData.find(x=>x.id===schedId);
  if(s&&count>0) s.status='완료';

  if(errors.length) showToast(`${count}건 출고 완료 (오류: ${errors.join(', ')})`, count>0);
  else showToast(`✅ ${count}종 출고 + "${schedName}" 완료 처리`);
  closeModal();
  if(mode==='stock') renderStock(); else renderSched();
}

function stockStats(){
  const tCost=outbound.reduce((s,o)=>s+(getP(o.productId)?.costPrice||0)*o.qty,0);
  const tRev=outbound.reduce((s,o)=>s+o.salePrice*o.qty,0);
  const profit=tRev-tCost;
  const stockVal=products.reduce((s,p)=>s+p.costPrice*p.stock,0);
  const low=products.filter(p=>p.stock<5).length;
  return{tRev,tCost,profit,margin:pct(profit,tRev),stockVal,low};
}

let salesCondData = {}; // {schedId: {saleTotal?, monthlyFee?}}

function updateSalesCond(type, schedId, val){
  if(!salesCondData[schedId]) salesCondData[schedId]={};
  if(type==='CMS') salesCondData[schedId].monthlyFee = +val;
  else             salesCondData[schedId].saleTotal  = +val;
}

// 행 데이터 생성
function buildAnalysisRows(){
  return schedData
    .filter(d=>['판매','렌탈','CMS'].includes(d.type))
    .map(d=>{
      const saved    = salesCondData[d.id]||{};
      const autoAmt  = parseAmount(d.note, d.type);
      const outCost  = outbound.filter(o=>o.schedId===String(d.id))
                               .reduce((s,o)=>s+(getP(o.productId)?.costPrice||0)*o.qty, 0);
      // 장비·수량 — outbound 연결건 기반
      const outItems = outbound.filter(o=>o.schedId===String(d.id));
      const equipSummary = outItems.length
        ? outItems.map(o=>{ const p=getP(o.productId); return p?`${p.name}×${o.qty}`:''; }).filter(Boolean).join(', ')
        : d.equipment || '-';
      const totalQty = outItems.reduce((s,o)=>s+o.qty, 0) || 1;

      let saleTotal=0, monthlyFee=0, calcNote='';

      if(d.type==='판매'){
        saleTotal = saved.saleTotal ?? autoAmt ?? 0;
      } else if(d.type==='렌탈'){
        // 총금액 입력 → ×77% = 실제 판매금액
        const totalAmt = saved.saleTotal ?? autoAmt ?? 0;
        monthlyFee = totalAmt; // 입력값 = 총금액
        saleTotal  = totalAmt ? Math.round(totalAmt * 0.77) : 0;
        calcNote   = totalAmt ? `${totalAmt.toLocaleString()}×77%` : '';
      } else if(d.type==='CMS'){
        monthlyFee = saved.monthlyFee ?? autoAmt ?? 0;
        saleTotal  = 0; // CMS는 판매금액 없음
      }

      const profit = d.type==='CMS'
        ? (monthlyFee - Math.round(outCost/36||0))
        : (saleTotal - outCost);

      return {
        id: d.id,
        date: d.date,
        month: d.date.slice(0,7),
        shopName: d.shopName,
        type: d.type,
        equipSummary,
        totalQty,
        saleTotal,
        monthlyFee,
        outCost,
        profit,
        calcNote,
        autoAmt,
      };
    })
    .sort((a,b)=>a.date.localeCompare(b.date));
}

function renderAnalysis(){
  const rows = buildAnalysisRows();

  // 월별 그룹핑
  const months = [...new Set(rows.map(r=>r.month))].sort();

  // 전체 KPI
  const totSale   = rows.filter(r=>r.type==='판매').reduce((s,r)=>s+r.saleTotal,0);
  const totRental = rows.filter(r=>r.type==='렌탈').reduce((s,r)=>s+r.saleTotal,0);
  const totCMS    = rows.filter(r=>r.type==='CMS').reduce((s,r)=>s+r.monthlyFee,0);
  const totProfit = rows.reduce((s,r)=>s+r.profit,0);

  // 헤더 컬럼

  // 데이터 행 렌더

          isRental ? `<span style="font-size:11px;color:#6b46c1;font-weight:700" id="${pid}">${r.saleTotal?r.saleTotal.toLocaleString():'-'}</span>

      <td style="padding:7px 6px">
        ${(isCMS||isRental) ? `<input type="number" id="${mid}" value="${r.monthlyFee||''}" placeholder="${r.autoAmt||'입력'}"

  // 월별 소계 행
  function monthSumRow(month, monthRows){
    const mSale   = monthRows.filter(r=>r.type==='판매').reduce((s,r)=>s+r.saleTotal,0);
    const mRental = monthRows.filter(r=>r.type==='렌탈').reduce((s,r)=>s+r.saleTotal,0);

      <td colspan="5" style="padding:8px 10px;color:#1a365d">
        📅 ${month.replace('-','년 ')}월 소계

  }).join('') : `<tr><td colspan="8" style="text-align:center;color:#a0aec0;padding:32px">설치일정에서 판매/렌탈/CMS 건을 추가하면 표시됩니다</td></tr>`;

  const totFreeCost = schedData.filter(d=>d.type==='무상')
    .reduce((s,d)=>s+outbound.filter(o=>o.schedId===String(d.id))
      .reduce((ss,o)=>ss+(getP(o.productId)?.costPrice||0)*o.qty,0),0);

  return `
  <!-- KPI -->
  <div class="kpi-grid" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr));margin-bottom:20px">
    ${[
      {l:'판매 합계',   v:krw(totSale),      c:'#c53030', i:'💳'},

  <div class="tcard" style="overflow-x:auto">
    <table style="min-width:640px;width:100%">
      <thead><tr>

        ${TH('금액 (판매·렌탈총액)')}${TH('월금액 (CMS)')}${TH('이익')}
      </tr></thead>
      <tbody>${tableBody}</tbody>
      ${rows.length?`<tfoot><tr style="background:#1a365d;color:#fff;font-weight:900;font-size:13px">
        <td colspan="5" style="padding:10px 10px">전체 합계</td>
        <td style="padding:10px 8px;text-align:right">${totSale||totRental?krw(totSale+totRental):'-'}</td>
        <td style="padding:10px 8px;text-align:right">${totCMS?krw(totCMS)+'/월':'-'}</td>
        <td style="padding:10px 10px;text-align:right">${colorProfit(totProfit)}</td>
      </tr></tfoot>`:''}
    </table>
    <div style="margin-top:8px;font-size:10px;color:#a0aec0">
      💡 렌탈 판매금액 = 총금액 × 77% 자동계산 | 메모에 금액이 있으면 자동 인식됩니다
    </div>
  </div>

  <!-- 무상 섹션 -->
  ${(()=>{
    const freeRows = schedData
      .filter(d => d.type === '무상')
      .map(d => {
        const outCost = outbound
          .filter(o => o.schedId === String(d.id))
          .reduce((s,o) => s + (getP(o.productId)?.costPrice||0)*o.qty, 0);
        const outItems = outbound.filter(o => o.schedId === String(d.id));
        const equipSummary = outItems.length
          ? outItems.map(o=>{ const p=getP(o.productId); return p?`${p.name}×${o.qty}`:''; }).filter(Boolean).join(', ')
          : d.equipment || '-';
        const totalQty = outItems.reduce((s,o)=>s+o.qty,0) || '-';
        return { ...d, outCost, equipSummary, totalQty };
      })
      .sort((a,b)=>a.date.localeCompare(b.date));

    if(!freeRows.length) return `
      <div class="sec-title" style="margin-top:8px">🎁 무상 설치 현황</div>
      <div class="tcard" style="text-align:center;color:#a0aec0;padding:24px;font-size:13px">무상 설치 건이 없습니다</div>`;

    const totalFreeCost = freeRows.reduce((s,r)=>s+r.outCost,0);

    // 월별 그룹
    const fMonths = [...new Set(freeRows.map(r=>r.date.slice(0,7)))].sort();

    const fTH = s => `<th style="padding:8px 8px;font-size:11px;color:#718096;white-space:nowrap;background:#fef9f0;border-bottom:2px solid #fbd38d">${s}</th>`;

    const fRows = fMonths.map(m => {
      const mRows = freeRows.filter(r=>r.date.slice(0,7)===m);
      const mCost = mRows.reduce((s,r)=>s+r.outCost,0);
      const dataRows = mRows.map(r=>`
        <tr style="border-bottom:1px solid #fef3c7">
          <td style="padding:7px 8px;font-size:11px;color:#718096;white-space:nowrap">${r.date.slice(5).replace('-','/')}</td>
          <td style="padding:7px 8px;font-size:12px;font-weight:700">${r.shopName}</td>
          <td style="padding:7px 8px;font-size:11px;color:#4a5568;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${r.equipSummary}">${r.equipSummary}</td>
          <td style="padding:7px 8px;font-size:12px;text-align:center">${r.totalQty}</td>
          <td style="padding:7px 8px;font-size:12px;color:#d69e2e;font-weight:700;text-align:right">${r.outCost ? krw(r.outCost) : '<span style="color:#a0aec0">미출고</span>'}</td>
          <td style="padding:7px 8px;font-size:12px;font-weight:700;text-align:right;color:#e53e3e">${r.outCost ? krw(-r.outCost) : '<span style="color:#a0aec0">-</span>'}</td>

          <td style="padding:7px 8px;font-size:11px;color:#718096">${(r.note||'').slice(0,40)}${(r.note||'').length>40?'…':''}</td>
        </tr>`).join('');
      const sumRow = `
        <tr style="background:#fef9f0;font-weight:800;font-size:12px">
          <td colspan="4" style="padding:8px 10px;color:#c05621">
            📅 ${m.replace('-','년 ')}월 소계
            <span style="font-weight:400;font-size:10px;color:#718096;margin-left:6px">${mRows.length}건</span>
          </td>
          <td style="padding:8px 8px;text-align:right;color:#d69e2e">${krw(mCost)}</td>
          <td style="padding:8px 8px;text-align:right;color:#e53e3e">${krw(-mCost)}</td>
          <td colspan="2" style="padding:8px 8px"></td>
        </tr>`;
      return dataRows + sumRow;
    }).join('');

    return `
    <div class="sec-title" style="margin-top:8px">🎁 무상 설치 현황</div>
    <div class="tcard" style="overflow-x:auto">
      <table style="min-width:580px;width:100%">
        <thead><tr>
          ${fTH('날짜')}${fTH('매장명')}${fTH('장비')}${fTH('수량')}${fTH('원가')}${fTH('손익')}${fTH('프로그램')}${fTH('메모')}
        </tr></thead>
        <tbody>${fRows}</tbody>
        <tfoot>
          <tr style="background:#dd6b2022;font-weight:900;font-size:13px">
            <td colspan="4" style="padding:10px 10px;color:#c05621">전체 무상 합계 (${freeRows.length}건)</td>
            <td style="padding:10px 8px;text-align:right;color:#d69e2e">${krw(totalFreeCost)}</td>
            <td style="padding:10px 8px;text-align:right;color:#e53e3e;font-weight:900">${krw(-totalFreeCost)}</td>
            <td colspan="2" style="padding:10px 8px;font-size:11px;color:#718096">원가 전액 비용처리</td>
          </tr>
        </tfoot>
      </table>
    </div>`;
  })()}`;
}

// 수익분석 실시간 계산
function liveRow(id, saleVal, monthVal, profitId, type, outCost){
  let profit = 0;
  if(type==='판매'){
    profit = (+saleVal||0) - outCost;
  } else if(type==='렌탈'){
    const total = +monthVal||0;
    const sale = Math.round(total*0.77);
    const pidEl = document.getElementById(`ap-${id}`);
    if(pidEl) pidEl.innerHTML = sale ? `${sale.toLocaleString()}<br><span style="font-size:9px;color:#a0aec0">${total.toLocaleString()}×77%</span>` : '-';
    profit = sale - outCost;
  } else if(type==='CMS'){
    profit = (+monthVal||0) - Math.round(outCost/36||0);
  }
  const el = document.getElementById(profitId);
  if(el) el.innerHTML = (saleVal||monthVal) ? colorProfit(profit) : '<span style="color:#a0aec0">-</span>';
}

function colorProfit(profit){
  const c=profit>=0?'#38a169':'#e53e3e';
  return`<span style="color:${c}">${krw(profit)}</span>`;
}

    id:_editSchedId||_sid++,

  const cost=+document.getElementById('i-cost').value;
  if(!pid||!qty){showToast('필수 항목을 입력하세요',false);return;}
  const p=getP(pid);
  const ibObj={id:_iid++,productId:pid,qty,costPrice:cost||p?.costPrice||0,date:document.getElementById('i-date').value,note:document.getElementById('i-note').value};

function openOutboundModal(productId, schedItem){
  showModal(`
    <div class="modal-hd"><div class="modal-title">출고 등록${schedItem?` — ${schedItem.shopName}`:''}</div><button class="xbtn" onclick="closeModal()">✕</button></div>

    <input type="hidden" id="o-schedname" value="${schedItem?.shopName||''}">
    <div class="fg" style="margin-top:10px">
      <div class="full"><label>상품 *</label>
        <select id="o-pid" onchange="calcOut()">
          <option value="">-- 선택 --</option>
          ${products.map(p=>`<option value="${p.id}"${p.id===(productId||0)?' selected':''}>${p.name} (재고:${p.stock})</option>`).join('')}
        </select>
      </div>
      <div><label>수량 *</label><input type="number" id="o-qty" placeholder="0" oninput="calcOut()"></div>
      <div><label>판매단가 (원)</label><input type="number" id="o-sale" placeholder="0" oninput="calcOut()"></div>
      <div><label>출고일자</label><input type="date" id="o-date" value="${today()}"></div>
      <div class="full"><label>비고</label><input type="text" id="o-note" value="${schedItem?.shopName||''}" placeholder="메모"></div>
      <div class="calc-box full" id="o-calc">수량과 판매가를 입력하면 수익이 계산됩니다</div>
    </div>
    <div class="mfoot"><button class="bcancel" onclick="closeModal()">취소</button><button class="bsave" onclick="saveOutbound()">저장</button></div>`);
}
function calcOut(){
  const pid=document.getElementById('o-pid')?.value;
  const q=+document.getElementById('o-qty')?.value;
  const s=+document.getElementById('o-sale')?.value;
  const b=document.getElementById('o-calc');
  if(!b)return;
  if(pid&&q&&s){
    const p=getP(pid);
    const rev=q*s;const cost=(p?.costPrice||0)*q;const profit=rev-cost;
    const mg=pct(profit,rev);
    b.innerHTML=`매출: <b style="color:#3182ce">${krw(rev)}</b> | 원가: <b style="color:#d69e2e">${krw(cost)}</b> | 이익: <b style="color:${profit>=0?'#38a169':'#e53e3e'}">${krw(profit)}</b> | 마진율: <b style="color:${mc(mg)}">${mg}%</b>`;
  }
}
function saveOutbound(){
  const pid=+document.getElementById('o-pid').value;
  const qty=+document.getElementById('o-qty').value;
  const sale=+document.getElementById('o-sale').value;
  const schedId=document.getElementById('o-schedid').value;
  const schedName=document.getElementById('o-schedname').value;
  if(!pid||!qty){showToast('필수 항목을 입력하세요',false);return;}
  const p=getP(pid);
  if(!p){showToast('상품을 선택하세요',false);return;}
  if(p.stock<qty){showToast(`재고 부족 (현재 ${p.stock}${p.unit})`,false);return;}
  outbound.push({id:_oid++,productId:pid,qty,salePrice:sale||0,date:document.getElementById('o-date').value,note:document.getElementById('o-note').value,schedId:schedId||null,schedName:schedName||null});
  products=products.map(x=>x.id===pid?{...x,stock:x.stock-qty}:x);
  // 설치일정 연결 시 자동 완료 처리
  if(schedId){
    const s=schedData.find(x=>x.id===+schedId);
    if(s&&s.status!=='완료'){
      s.status='완료';
      showToast(`✅ 출고 등록 + "${s.shopName}" 완료 처리`);
    } else {
      showToast('출고 등록되었습니다');
    }
  } else {
    showToast('출고 등록되었습니다');
  }
  closeModal();
  if(mode==='stock')renderStock();else renderSched();
}

          return`<tr style="border-bottom:1px solid #f0f4f8">
            <td style="padding:8px 10px;font-weight:700;font-size:12px">${b.shopName}</td>
            <td style="padding:8px 8px;font-size:11px">${b.type||'-'}</td>
            <td style="padding:8px 8px;font-size:11px">${b.billingDate||'-'}</td>
            <td style="padding:8px 8px;font-size:12px;color:#3182ce;font-weight:700">${krw(b.amount)}</td>
            <td style="padding:8px 8px;font-size:11px">${b.paidDate||'-'}</td>
            <td style="padding:8px 8px"><span style="background:${sc}22;color:${sc};padding:2px 7px;border-radius:99px;font-size:10px;font-weight:800">${b.status}</span></td>
            <td style="padding:8px 8px;font-size:11px;color:#718096">${b.note||'-'}</td>
            <td style="padding:8px 8px">
              <button class="ebtn" onclick="openBillingModal(${b.id})">수정</button>
              <button class="dbtn" onclick="delBilling(${b.id})">삭제</button>
            </td>
          </tr>`;
        }).join('') : '<tr><td colspan="8" style="text-align:center;color:#a0aec0;padding:40px;font-size:13px">💳 수금 내역을 등록해주세요</td></tr>'}
        </tbody>
      </table>
    </div>`;
}

let _bid=1;
function openBillingModal(id){
  const b=id?billings.find(x=>x.id===id):{};
  showModal(`
    <div class="modal-hd"><div class="modal-title">${id?'수금 수정':'수금 등록'}</div><button class="xbtn" onclick="closeModal()">✕</button></div>
    <div class="fg">
      <div class="full"><label>매장명 *</label><input type="text" id="b-shop" value="${b.shopName||''}"></div>
      <div><label>유형</label><select id="b-type">${['렌탈','CMS','판매','AS','출장비'].map(t=>`<option${t===b.type?' selected':''}>${t}</option>`).join('')}</select></div>
      <div><label>청구일</label><input type="date" id="b-bdate" value="${b.billingDate||today()}"></div>
      <div><label>청구금액 *</label><input type="number" id="b-amt" value="${b.amount||''}"></div>
      <div><label>수금일</label><input type="date" id="b-pdate" value="${b.paidDate||''}"></div>
      <div><label>상태</label><select id="b-status">${['미수금','부분수금','수금완료'].map(s=>`<option${s===b.status?' selected':''}>${s}</option>`).join('')}</select></div>
      <div class="full"><label>메모</label><textarea id="b-note">${b.note||''}</textarea></div>
    </div>
    <div class="mfoot">
      ${id?`<button class="bdel" onclick="delBilling(${id});closeModal()">삭제</button>`:''}
      <button class="bcancel" onclick="closeModal()">취소</button>
      <button class="bsave" onclick="saveBilling(${id||0})">저장</button>
    </div>`);
}
function saveBilling(id){
  const shop=document.getElementById('b-shop').value.trim();
  const amt=+document.getElementById('b-amt').value;
  if(!shop||!amt){showToast('필수 항목을 입력하세요',false);return;}
  const obj={id:id||_bid++,shopName:shop,type:document.getElementById('b-type').value,billingDate:document.getElementById('b-bdate').value,amount:amt,paidDate:document.getElementById('b-pdate').value,status:document.getElementById('b-status').value,note:document.getElementById('b-note').value};
  if(id) billings=billings.map(b=>b.id===id?obj:b); else billings.push(obj);
  dbSave('billings', obj);
  showToast(id?'수정되었습니다':'등록되었습니다');closeModal();renderBilling();
}
function delBilling(id){if(!confirm('삭제하시겠습니까?'))return;billings=billings.filter(b=>b.id!==id);dbDel('billings',id);showToast('삭제되었습니다');renderBilling();}

// ════════════════════════════════
// AS 관리
// ════════════════════════════════
let asData = [];
const AS_STATUS = ['접수','처리중','완료','보류'];

function renderAS(){
  const sc={};asData.forEach(a=>{sc[a.status]=(sc[a.status]||0)+1;});
  document.getElementById('summary-bar').innerHTML=`<div class="sum-inner">
    <div class="sum-item">📞 전체 <span class="sum-v">${asData.length}건</span></div>
    <div class="sum-item">🔴 접수 <span class="sum-v" style="color:#fc8181">${sc['접수']||0}</span></div>
    <div class="sum-item">🔄 처리중 <span class="sum-v" style="color:#fbd38d">${sc['처리중']||0}</span></div>
    <div class="sum-item">✅ 완료 <span class="sum-v" style="color:#68d391">${sc['완료']||0}</span></div>
  </div>`;
  document.getElementById('sub-inner').innerHTML=AS_STATUS.map(s=>`
    <button class="sub-btn${s===asTab?' on':''}" onclick="asTab='${s}';renderAS()">${s}
      <span class="cnt">${sc[s]||0}</span>
    </button>`).join('');
  const list=asData.filter(a=>a.status===asTab);
  document.getElementById('main-area').innerHTML=`
    <div class="row-between">
      <div class="sec-title" style="margin:0">📞 AS 관리</div>
      <button class="add-btn" onclick="openASModal()">+ AS 접수</button>
    </div>
    <div class="cards">${list.length ? list.map(a=>{
      const sc2={'접수':'#e53e3e','처리중':'#d69e2e','완료':'#38a169','보류':'#718096'}[a.status]||'#718096';
      return`<div class="card">
        <div class="card-top" onclick="openASModal(${a.id})">
          <div>
            <div class="card-name">${a.shopName}</div>
            <div class="card-sub">${a.receiptDate} · ${a.manager||'-'}</div>
          </div>
          <span style="background:${sc2}22;color:${sc2};padding:2px 8px;border-radius:99px;font-size:10px;font-weight:800">${a.status}</span>
        </div>
        <div class="card-body">
          ${a.contact?`<div class="cr"><span class="l">연락처</span><span class="v">${a.contact}</span></div>`:''}
          ${a.equipment?`<div class="cr"><span class="l">장비</span><span class="v" style="color:#2b6cb0">${a.equipment}</span></div>`:''}
          <div class="cr"><span class="l">증상</span><span class="v" style="font-size:11px">${(a.symptom||'').slice(0,60)}${(a.symptom||'').length>60?'…':''}</span></div>
          ${a.fee?`<div class="cr"><span class="l">비용</span><span class="v" style="color:#3182ce;font-weight:700">${krw(a.fee)}</span></div>`:''}
        </div>
        <div class="card-foot">
          <select class="ssel" style="background:${sc2}22;color:${sc2}" onchange="changeASStatus(event,${a.id})">
            ${AS_STATUS.map(s=>`<option${s===a.status?' selected':''}>${s}</option>`).join('')}
          </select>
          <div>
            <button class="ebtn" onclick="openASModal(${a.id})">수정</button>
            <button class="dbtn" onclick="delAS(${a.id})">삭제</button>
          </div>
        </div>
      </div>`;
    }).join('') : '<div class="empty">해당 상태의 AS 건이 없습니다</div>'}</div>`;
}

let asTab='접수', _asid=1;
function changeASStatus(e,id){const a=asData.find(x=>x.id===id);if(a){a.status=e.target.value;renderAS();}}
function openASModal(id){
  const a=id?asData.find(x=>x.id===id):{};
  showModal(`
    <div class="modal-hd"><div class="modal-title">${id?'AS 수정':'AS 접수'}</div><button class="xbtn" onclick="closeModal()">✕</button></div>
    <div class="fg">
      <div class="full"><label>매장명 *</label><input type="text" id="as-shop" value="${a.shopName||''}"></div>
      <div><label>담당자</label><input type="text" id="as-mgr" value="${a.manager||''}"></div>
      <div><label>연락처</label><input type="text" id="as-contact" value="${a.contact||''}"></div>
      <div><label>접수일</label><input type="date" id="as-rdate" value="${a.receiptDate||today()}"></div>
      <div><label>처리완료일</label><input type="date" id="as-cdate" value="${a.completeDate||''}"></div>
      <div><label>상태</label><select id="as-status">${AS_STATUS.map(s=>`<option${s===(a.status||'접수')?' selected':''}>${s}</option>`).join('')}</select></div>
      <div class="full"><label>장비</label><input type="text" id="as-equip" value="${a.equipment||''}"></div>
      <div class="full"><label>증상/내용</label><textarea id="as-symptom">${a.symptom||''}</textarea></div>
      <div class="full"><label>처리내용</label><textarea id="as-result">${a.result||''}</textarea></div>
      <div><label>비용</label><input type="number" id="as-fee" value="${a.fee||''}"></div>
      <div><label>프로그램</label><input type="text" id="as-prog" value="${a.program||''}"></div>
    </div>
    <div class="mfoot">
      ${id?`<button class="bdel" onclick="delAS(${id});closeModal()">삭제</button>`:''}
      <button class="bcancel" onclick="closeModal()">취소</button>
      <button class="bsave" onclick="saveAS(${id||0})">저장</button>
    </div>`);
}
function saveAS(id){
  const shop=document.getElementById('as-shop').value.trim();
  if(!shop){showToast('매장명을 입력하세요',false);return;}
  const obj={id:id||_asid++,shopName:shop,manager:document.getElementById('as-mgr').value,contact:document.getElementById('as-contact').value,receiptDate:document.getElementById('as-rdate').value,completeDate:document.getElementById('as-cdate').value,status:document.getElementById('as-status').value,equipment:document.getElementById('as-equip').value,symptom:document.getElementById('as-symptom').value,result:document.getElementById('as-result').value,fee:+document.getElementById('as-fee').value||0,program:document.getElementById('as-prog').value};
  if(id) asData=asData.map(a=>a.id===id?obj:a); else asData.push(obj);
  dbSave('asData', obj);
  showToast(id?'수정되었습니다':'접수되었습니다');closeModal();renderAS();
}
function delAS(id){if(!confirm('삭제하시겠습니까?'))return;asData=asData.filter(a=>a.id!==id);dbDel('asData',id);showToast('삭제되었습니다');renderAS();}

// ════════════════════════════════
// 일정 업로드 (이미지 → 자동파싱)
// ════════════════════════════════
function renderUpload(){
  document.getElementById('summary-bar').innerHTML=`<div class="sum-inner"><div class="sum-item">📸 이미지 업로드로 일정 자동 추가</div></div>`;
  document.getElementById('sub-inner').innerHTML='';
  document.getElementById('main-area').innerHTML=`
    <div class="sec-title">📸 일정 이미지 업로드</div>
    <div class="tcard" style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:16px">📸</div>
      <div style="font-size:15px;font-weight:700;color:#1a365d;margin-bottom:8px">설치일정 이미지를 업로드하면 자동으로 파싱됩니다</div>
      <div style="font-size:12px;color:#718096;margin-bottom:24px">Claude AI가 이미지를 읽어 설치일정 데이터로 변환합니다</div>
      <label style="display:inline-block;background:#1a365d;color:#fff;padding:12px 28px;border-radius:10px;cursor:pointer;font-weight:700;font-size:14px">
        📁 이미지 선택
        <input type="file" accept="image/*" multiple style="display:none" onchange="handleImageUpload(event)">
      </label>
      <div style="margin-top:12px;font-size:11px;color:#a0aec0">JPG, PNG 지원 · 여러 장 동시 선택 가능</div>
    </div>
    <div id="upload-preview"></div>
    <div style="margin-top:16px;background:#fffbeb;border:1px solid #fbd38d;border-radius:10px;padding:14px 16px;font-size:12px;color:#744210">
      ⚡ <b>Claude API 연동 후 자동 파싱 가능</b><br>
      현재는 이미지를 Claude 채팅에 보내주시면 제가 읽고 데이터를 추가해드리고 있어요.<br>
      Firebase 연동과 함께 API 키 설정하면 앱 안에서 바로 자동 처리됩니다.
    </div>`;
}

function handleImageUpload(e){
  const files=[...e.target.files];
  if(!files.length) return;
  const preview=document.getElementById('upload-preview');
  preview.innerHTML=`<div class="sec-title" style="margin-top:20px">업로드된 이미지 (${files.length}장)</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px">
      ${files.map(f=>`<div style="background:#fff;border:1px solid #e2e8f0;border-radius:8px;overflow:hidden">
        <img src="${URL.createObjectURL(f)}" style="width:100%;height:140px;object-fit:cover">
        <div style="padding:8px;font-size:11px;color:#718096">${f.name}</div>
      </div>`).join('')}
    </div>
    <div style="margin-top:12px;background:#ebf8ff;border:1px solid #bee3f8;border-radius:8px;padding:12px;font-size:12px;color:#2c5282">
      💡 이미지가 업로드됐어요! Claude API 연동 전까지는 이 이미지를 Claude 채팅창에 보내주시면 데이터를 추가해드릴게요.
    </div>`;
}

// ── 로딩 오버레이 ──
function showLoadingOverlay(show){
  const el = document.getElementById('loading-overlay');
  if(el) el.style.display = show ? 'flex' : 'none';
}

// ── Firebase 연동 저장/삭제 래퍼 ──
async function dbSave(col, item){
  try { if(window.fsSave) await window.fsSave(col, item); } catch(e){ console.warn('DB저장오류',e); }
}
async function dbDel(col, id){
  try { if(window.fsDel) await window.fsDel(col, id); } catch(e){ console.warn('DB삭제오류',e); }
}

// ── INIT ──
function showLoadingOverlay(show){
  const el = document.getElementById('loading-overlay');
  if(el) el.style.display = show ? 'flex' : 'none';
}
window._appReady = false;
document.getElementById('hd-date').textContent=new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'long',day:'numeric'});
updateBadges();
render();
</script>
